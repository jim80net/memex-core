name: Release Please

on:
  push:
    branches: [main]
  # Manual recovery path: trigger this workflow to re-run publish for the
  # current package.json version. Useful when release-please created the
  # git tag but the publish job failed (e.g., an upstream npm bug). See
  # the publish job's `if` below — manual dispatch bypasses the
  # `release_created` gate.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip on manual dispatch — we don't want release-please to create
    # another release when we're just retrying a failed publish.
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    # Run on: (a) a push where release-please created a new release, or
    # (b) a manual workflow_dispatch (recovery path). `!cancelled()` lets
    # us proceed when release-please is skipped on manual dispatch while
    # still respecting workflow cancellation.
    if: |
      !cancelled() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install a working npm (bundled npm in Node 22.22.2 is broken)
        # Node 22.22.2 ships with an npm install that is missing the
        # `promise-retry` dependency, so `npm install -g npm@latest` fails
        # with MODULE_NOT_FOUND before it can upgrade itself. Corepack's
        # `prepare --activate` stages a new npm in the corepack cache but
        # does not actually replace the npm binary in the PATH that this
        # shell sees (it prints the old version). Instead, download the
        # npm@11.6.0 tarball directly and extract it over the broken
        # bundled install. npm 11.6.0 supports OIDC trusted publishing.
        #
        # SECURITY: we verify the tarball against the sha512 integrity
        # value published in the registry's package metadata before
        # extracting it. Both requests go to registry.npmjs.org (the
        # same origin we're about to publish to), so the trust model is
        # unchanged, but this protects against in-transit tampering
        # between the metadata fetch and the tarball fetch, and ensures
        # we install the exact bytes the registry says 11.6.0 should be.
        run: |
          set -euo pipefail
          NPM_VERSION=11.6.0
          NODE_BIN=$(which node)
          NODE_DIR=$(dirname $(dirname $NODE_BIN))
          NPM_DIR="$NODE_DIR/lib/node_modules/npm"
          TMP=$(mktemp -d)

          EXPECTED_INTEGRITY=$(
            curl -fsSL "https://registry.npmjs.org/npm/$NPM_VERSION" \
            | python3 -c "import json, sys; print(json.load(sys.stdin)['dist']['integrity'])"
          )
          if [[ "$EXPECTED_INTEGRITY" != sha512-* ]]; then
            echo "unexpected integrity format from registry: $EXPECTED_INTEGRITY" >&2
            exit 1
          fi

          curl -fsSL "https://registry.npmjs.org/npm/-/npm-$NPM_VERSION.tgz" -o "$TMP/npm.tgz"

          ACTUAL_INTEGRITY="sha512-$(openssl dgst -sha512 -binary "$TMP/npm.tgz" | base64 -w0)"
          if [ "$ACTUAL_INTEGRITY" != "$EXPECTED_INTEGRITY" ]; then
            echo "npm tarball integrity check failed" >&2
            echo "  expected: $EXPECTED_INTEGRITY" >&2
            echo "  actual:   $ACTUAL_INTEGRITY" >&2
            exit 1
          fi

          tar -xzf "$TMP/npm.tgz" -C "$TMP"
          sudo rm -rf "$NPM_DIR"
          sudo mv "$TMP/package" "$NPM_DIR"
          hash -r
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public
