name: Release Please

on:
  push:
    branches: [main]
  # Manual recovery path: trigger this workflow to re-run publish for the
  # current package.json version. Useful when release-please created the
  # git tag but the publish job failed (e.g., an upstream npm bug). See
  # the publish job's `if` below — manual dispatch bypasses the
  # `release_created` gate.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip on manual dispatch — we don't want release-please to create
    # another release when we're just retrying a failed publish.
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    # Run on: (a) a push where release-please created a new release, or
    # (b) a manual workflow_dispatch (recovery path). `!cancelled()` lets
    # us proceed when release-please is skipped on manual dispatch while
    # still respecting workflow cancellation.
    if: |
      !cancelled() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install a working npm (bundled npm in Node 22.22.2 is broken)
        # Node 22.22.2 ships with an npm install that is missing the
        # `promise-retry` dependency, so `npm install -g npm@latest` fails
        # with MODULE_NOT_FOUND before it can upgrade itself. Use corepack
        # to install a known-good npm version that supports OIDC trusted
        # publishing.
        run: |
          corepack enable
          corepack prepare npm@11.6.0 --activate
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public
